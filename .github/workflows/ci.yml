name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # License policy gate (AGPL-3.0 server, permissive-only dependency
  # tree; copyleft transitives are review-gated in server/deny.toml).
  licenses:
    name: cargo-deny (license policy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses
          manifest-path: server/Cargo.toml

  rust:
    name: rust (fmt, clippy, nextest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      # postgres:15 on purpose — the schema contract targets Postgres >=15,
      # so CI pins the floor (a query that needs 16+ features must fail here).
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: chimely
          POSTGRES_PASSWORD: chimely
          POSTGRES_DB: chimely
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chimely"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://chimely:chimely@localhost:5432/chimely
      REDIS_URL: redis://localhost:6379
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo nextest run

  ts:
    name: ts (biome, typecheck, vitest)
    runs-on: ubuntu-latest
    steps:
      # Full history: changeset status diffs against the base branch.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # @chimely/react typechecks against @chimely/client's build output
      - run: pnpm --filter "./packages/*" build
      - run: pnpm typecheck
      - run: pnpm test
      # Release readiness (advisory, non-blocking): a pending changeset exists
      # and both packages publish as built. Docs-only or non-package PRs
      # legitimately carry no changeset, so a failure here must not block the
      # ts check. release.yml is the gate that drives the versioned publish.
      - name: Release readiness
        continue-on-error: true
        run: |
          pnpm changeset status --since=origin/main
          pnpm --filter "./packages/*" exec pnpm publish --dry-run --no-git-checks

  # PR and main-branch image builds: amd64 only, single job, unchanged
  # behavior. Release tags are handled by docker-release below.
  docker:
    name: docker image
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Release images are multi-arch (amd64 + arm64) so `docker run` works
  # natively on Apple Silicon and arm servers. Each arch builds NATIVELY on
  # its own runner (no QEMU). ubuntu-24.04-arm is free for public repos
  # only, and release tags are pushed at or after the public launch, so tag
  # builds always have the runner. Each leg pushes by digest; the manifest
  # job below stitches one multi-arch list under the release tags, so a
  # single-leg failure publishes no tag at all rather than a partial one.
  docker-release:
    name: docker release image (${{ matrix.arch }})
    if: github.ref_type == 'tag'
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-release-manifest:
    name: docker release manifest
    if: github.ref_type == 'tag'
    needs: docker-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=sha
      - name: Create and push the multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)
      - name: Inspect the pushed manifest
        run: docker buildx imagetools inspect 'ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}'
