name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # License policy gate (FSL-1.1-MIT server, permissive-only dependency
  # tree; copyleft transitives are review-gated in server/deny.toml).
  licenses:
    name: cargo-deny (license policy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses
          manifest-path: server/Cargo.toml

  rust:
    name: rust (fmt, clippy, nextest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      # postgres:15 on purpose — the schema contract targets Postgres >=15,
      # so CI pins the floor (a query that needs 16+ features must fail here).
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dronte
          POSTGRES_PASSWORD: dronte
          POSTGRES_DB: dronte
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dronte"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://dronte:dronte@localhost:5432/dronte
      REDIS_URL: redis://localhost:6379
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo nextest run

  ts:
    name: ts (biome, typecheck, vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # @dronte/react typechecks against @dronte/client's build output
      - run: pnpm --filter "./packages/*" build
      - run: pnpm typecheck
      - run: pnpm test

  generated:
    name: generated artifacts fresh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Regenerate @dronte/client types + docs spec from `dronte openapi`
        run: pnpm generate
      - name: Fail if committed generated artifacts are stale
        run: git diff --exit-code -- packages/client/src/generated docs/openapi

  # REQUIRED (the Phase 1/2 completion criterion, see CLAUDE.md "API
  # contract rules"): the generated spec must equal specs/openapi.yaml,
  # the frozen convergence target. Mark this job required in branch
  # protection. After v1 the hand-written spec retires and this gate
  # becomes oasdiff breaking-change detection against the previous
  # release.
  contract:
    name: contract convergence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Export the generated spec
        run: cargo run --manifest-path server/Cargo.toml -- openapi > /tmp/openapi.gen.yaml
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install oasdiff
        run: |
          go install github.com/oasdiff/oasdiff@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Semantic diff against the frozen convergence target
        run: oasdiff diff specs/openapi.yaml /tmp/openapi.gen.yaml --fail-on-diff

  docker:
    name: docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
