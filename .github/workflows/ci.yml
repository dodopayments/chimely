name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # License policy gate (FSL-1.1-MIT server, permissive-only dependency
  # tree; copyleft transitives are review-gated in server/deny.toml).
  licenses:
    name: cargo-deny (license policy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses
          manifest-path: server/Cargo.toml

  rust:
    name: rust (fmt, clippy, nextest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      # postgres:15 on purpose — the schema contract targets Postgres >=15,
      # so CI pins the floor (a query that needs 16+ features must fail here).
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dronte
          POSTGRES_PASSWORD: dronte
          POSTGRES_DB: dronte
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dronte"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://dronte:dronte@localhost:5432/dronte
      REDIS_URL: redis://localhost:6379
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo nextest run

  ts:
    name: ts (biome, typecheck, vitest)
    runs-on: ubuntu-latest
    steps:
      # Full history: changeset status diffs against the base branch.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # @dronte/react typechecks against @dronte/client's build output
      - run: pnpm --filter "./packages/*" build
      - run: pnpm typecheck
      - run: pnpm test
      # The built .d.ts of each package must satisfy the frozen contract
      # (specs/sdk-api.d.ts, mechanically renamed so spec and impl
      # type-check in one program).
      - name: Contract conformance of built types
        run: pnpm conformance
      # Release readiness: a pending changeset exists and both packages are
      # publishable as built (changesets drives the actual versioned
      # publish, see release.yml).
      - name: Release readiness
        run: |
          pnpm changeset status --since=origin/main
          pnpm --filter "./packages/*" exec pnpm publish --dry-run --no-git-checks

  generated:
    name: generated artifacts fresh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Regenerate @dronte/client types + docs spec from `dronte openapi`
        run: pnpm generate
      - name: Fail if committed generated artifacts are stale
        run: git diff --exit-code -- packages/client/src/generated docs/openapi

  # REQUIRED (the Phase 1/2 completion criterion, see CLAUDE.md "API
  # contract rules"): the generated spec must equal specs/openapi.yaml,
  # the frozen convergence target, and the delta stays permanently empty
  # until the v1 release flips this gate to breaking-change detection
  # against the last release. Mark this job required in branch protection.
  # Post-freeze ADDITIVE surface sanctioned by phase specs is stripped from
  # the generated document before the strict diff — anything not on that
  # list still fails the gate.
  contract:
    name: contract convergence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Export the generated spec
        run: cargo run --manifest-path server/Cargo.toml -- openapi > /tmp/openapi.gen.yaml
      - name: Strip sanctioned post-freeze additions (phase-3 status timeline, honest error codes)
        run: |
          python3 - <<'EOF'
          import yaml
          doc = yaml.safe_load(open('/tmp/openapi.gen.yaml'))
          # specs/phase-3-hardening.md, deliverable 2: additive endpoint(s).
          sanctioned_paths = ['/v1/notifications/{id}/timeline']
          sanctioned_schemas = ['NotificationTimeline', 'TimelineEntry']
          # Honest response codes the handler really returns that the frozen 3.0
          # spec under-declares. The generated/served spec and @dronte/client
          # keep them (schemathesis verifies annotation==handler); the strict
          # convergence diff excludes them until the frozen spec retires at v1.
          sanctioned_responses = [
              ('/v1/inbox/items', 'get', '400'),
              ('/v1/subscribers/{subscriber_id}', 'put', '400'),
          ]
          for path in sanctioned_paths:
              assert doc['paths'].pop(path, None) is not None, f'{path} missing from generated spec'
          for schema in sanctioned_schemas:
              assert doc['components']['schemas'].pop(schema, None) is not None, f'{schema} missing'
          for path, method, code in sanctioned_responses:
              responses = doc['paths'][path][method]['responses']
              assert responses.pop(code, None) is not None, f'{method} {path} {code} missing'
          # specs/phase-4-admin.md: the embedded admin dashboard's API is an
          # additive post-freeze plane (own `admin` tag, /admin/api paths,
          # Admin* schemas, the AdminToken Basic scheme). It is kept in the
          # served/generated spec and stripped from the strict convergence
          # diff, exactly like the phase-3 timeline above.
          admin_paths = [p for p in list(doc['paths']) if p.startswith('/admin')]
          assert admin_paths, 'admin plane missing from generated spec'
          for path in admin_paths:
              doc['paths'].pop(path)
          doc['tags'] = [t for t in doc.get('tags', []) if t.get('name') != 'admin']
          for schema in [s for s in list(doc['components']['schemas']) if s.startswith('Admin')]:
              doc['components']['schemas'].pop(schema)
          doc.get('components', {}).get('securitySchemes', {}).pop('AdminToken', None)
          yaml.safe_dump(doc, open('/tmp/openapi.gen.stripped.yaml', 'w'), sort_keys=False)
          EOF
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install oasdiff
        run: |
          go install github.com/oasdiff/oasdiff@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Semantic diff against the frozen convergence target
        run: oasdiff diff specs/openapi.yaml /tmp/openapi.gen.stripped.yaml --fail-on-diff

  docker:
    name: docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
