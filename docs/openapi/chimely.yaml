  /admin/api/environments/{env_id}/hmac/rotate:
    post:
      tags:
      - admin
      summary: Begin HMAC rotation
      description: Generate a new subscriber HMAC secret while keeping the old one valid during the changeover, so live inbox sessions are not interrupted. Complete the rotation once every backend uses the new secret.
      operationId: adminRotateHmac
      parameters:
      - name: env_id
        in: path
        description: Environment TypeID (env_…).
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Rotated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminHmacRotation'
        '401':
          description: Authentication required (no or expired session).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: unauthorized
                  message: admin session required
        '403':
          description: Authenticated but the role lacks the capability.
          content:
            application/json:
              schema:
