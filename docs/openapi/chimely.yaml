  /admin/api/environments/{env_id}/notifications:
    get:
      tags:
      - admin
      summary: List notifications
      operationId: adminListNotifications
      parameters:
      - name: env_id
        in: path
        description: Environment TypeID (env_…).
        required: true
        schema:
          type: string
      - name: subscriber_id
        in: path
        description: Customer-provided subscriber id.
        required: true
        schema:
          type: string
          nullable: true
      - name: category
        in: path
        required: true
        schema:
          type: string
          nullable: true
      - name: after
        in: path
        description: Lower bound on `visible_at` (inclusive), RFC 3339.
        required: true
        schema:
          type: string
          format: date-time
          nullable: true
      - name: before
        in: path
        description: Upper bound on `visible_at` (exclusive), RFC 3339.
        required: true
        schema:
          type: string
          format: date-time
          nullable: true
      - name: limit
        in: path
        required: true
        schema:
          type: integer
          format: int64
          nullable: true
      - name: cursor
        in: path
        description: Opaque keyset cursor from the previous page's `next_cursor`.
        required: true
        schema:
          type: string
          nullable: true
      responses:
        '200':
          description: A page of notifications.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminNotificationPage'
        '400':
          description: Malformed cursor or out-of-range limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: invalid_request
                  message: malformed cursor
        '401':
          description: Authentication required (no or expired session).
          content:
            application/json:
              schema:
