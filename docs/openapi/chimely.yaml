- url: https://chimely.dev
paths:
  /admin/api/dlq:
    get:
      tags:
      - admin
      summary: List dead letters
      operationId: adminListDeadLetters
      responses:
        '200':
          description: Parked jobs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminDeadLetter'
        '401':
          description: Authentication required (no or expired session).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: unauthorized
                  message: admin session required
        '403':
          description: Authenticated but the role lacks the capability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: forbidden
                  message: your role does not permit this action
      security:
      - AdminSession: []
