          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateBroadcastRequest'
        required: true
      responses:
        '200':
          description: Idempotent replay.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Broadcast'
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Broadcast'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: invalid_request
                  message: category must be 1–255 characters
