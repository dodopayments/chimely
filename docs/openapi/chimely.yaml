      description: The subscriber's inbox, newest first, combining direct notifications and broadcasts. Use cursor for pagination and If-None-Match for conditional fetches.
      operationId: listInboxItems
      parameters:
      - name: cursor
        in: query
        description: Opaque keyset cursor; omit for the first page.
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          maximum: 100
          minimum: 1
      - name: filter
        in: query
        description: View filter. Omit for the default view, or `unread` for unread items only.
        required: false
        schema:
          type: string
          enum:
          - unread
          - archived
      - name: If-None-Match
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: A page of inbox items.
          headers:
            Cache-Control:
              schema:
                type: string
              description: Always `private, max-age=0`.
            ETag:
              schema:
                type: string
              description: Strong validator for this page + read state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxPage'
        '304':
          description: Not modified (If-None-Match matched).
        '400':
          description: Malformed cursor or out-of-range limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: invalid_request
