      - management
      summary: Notification timeline
      description: 'The history of one notification: when it was created, delivered, seen, and read. Entries are ordered by time. Broadcasts have no per-subscriber timeline.'
      operationId: getNotificationTimeline
      parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/NotificationId'
      responses:
        '200':
          description: The timeline so far.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTimeline'
        '401':
          description: Missing/invalid API key or subscriber hash.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: unauthorized
                  message: invalid API key
        '404':
          description: Resource not found in this environment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: not_found
                  message: no such notification
        '429':
          $ref: '#/components/responses/RateLimited'
      security:
      - ApiKeyBearer: []
  /v1/subscribers/{subscriber_id}:
    put:
      tags:
      - management
      summary: Upsert a subscriber
      description: Create or update a subscriber. Subscribers are normally created automatically; use this for imports. On first create, created_at may be backdated to control which past broadcasts the subscriber sees.
      operationId: upsertSubscriber
      parameters:
      - name: subscriber_id
        in: path
        description: Customer-provided subscriber id (e.g. `usr_42`).
        required: true
        schema:
          type: string
          maxLength: 255
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                created_at:
                  type: string
                  format: date-time
                  description: Backdate on create only. Ignored if the subscriber exists.
        required: false
      responses:
        '200':
          description: Upserted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscriber'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: invalid_request
                  message: subscriber_id must be 1–255 characters
        '401':
          description: Missing/invalid API key or subscriber hash.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: unauthorized
                  message: invalid API key
      security:
      - ApiKeyBearer: []
  /v1/subscribers/{subscriber_id}/preferences:
    get:
      tags:
      - management
      summary: Get subscriber preferences
      operationId: getSubscriberPreferences
      parameters:
      - name: subscriber_id
        in: path
        description: Customer-provided subscriber id (e.g. `usr_42`).
        required: true
        schema:
          type: string
          maxLength: 255
      responses:
        '200':
          description: Explicit preference rows only — absence means enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferenceList'
        '401':
          description: Missing/invalid API key or subscriber hash.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: unauthorized
                  message: invalid API key
        '404':
          description: Resource not found in this environment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: not_found
                  message: no such subscriber
      security:
      - ApiKeyBearer: []
    put:
      tags:
      - management
      summary: Set subscriber preferences
      operationId: setSubscriberPreferences
      parameters:
      - name: subscriber_id
        in: path
        description: Customer-provided subscriber id (e.g. `usr_42`).
        required: true
        schema:
          type: string
          maxLength: 255
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceWriteList'
        required: true
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferenceList'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: invalid_request
                  message: preferences must contain 1–100 entries
        '401':
          description: Missing/invalid API key or subscriber hash.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: unauthorized
                  message: invalid API key
      security:
      - ApiKeyBearer: []
components:
  schemas:
    AdminApiKey:
      type: object
      required:
      - id
      - name
      - key_prefix
      - created_at
      properties:
        created_at:
          type: string
        id:
          type: string
          description: TypeID, `key_…`.
        key_prefix:
          type: string
          description: Display prefix for recognition. The full key is never retrievable.
        last_used_at:
          type: string
          nullable: true
        name:
          type: string
        revoked_at:
          type: string
          nullable: true
    AdminApiKeyCreated:
      type: object
      required:
      - id
      - name
      - key_prefix
      - key
      - created_at
      properties:
        created_at:
          type: string
        id:
          type: string
        key:
          type: string
          description: The plaintext key, shown EXACTLY once. Only the sha256 hash is stored.
        key_prefix:
          type: string
        name:
          type: string
    AdminCounts:
      type: object
      required:
      - unread
      - unseen
      properties:
        unread:
          type: integer
          format: int32
        unseen:
          type: integer
          format: int32
    AdminCreateApiKeyRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
    AdminCreateBroadcastRequest:
      type: object
      required:
      - category
      properties:
        category:
          type: string
        idempotency_key:
          type: string
          nullable: true
        payload: {}
    AdminCreateEnvironmentRequest:
      type: object
      required:
      - slug
      - name
      properties:
        name:
          type: string
        require_subscriber_hash:
          type: boolean
          description: Production default true. Set false for a dev/quickstart environment.
        slug:
          type: string
    AdminCreateUserRequest:
      type: object
      required:
      - email
      - name
      - role
      - password
      properties:
        email:
          type: string
        name:
          type: string
        password:
          type: string
          description: At least 12 characters (server-enforced). The UI shows it once.
        role:
          type: string
    AdminDeadLetter:
      type: object
      required:
      - id
      - environment_slug
      - job_type
      - attempts
      - last_error
      - parked_at
      properties:
        attempts:
          type: integer
          format: int32
        environment_slug:
          type: string
        id:
          type: string
          description: TypeID, `job_…` (stable across park/replay).
        job_type:
          type: string
        last_error:
          type: string
        parked_at:
          type: string
    AdminEnvironment:
      type: object
      required:
      - id
      - slug
      - name
      - require_subscriber_hash
      - created_at
      properties:
        created_at:
          type: string
        id:
          type: string
          description: TypeID, `env_…`.
        name:
          type: string
        require_subscriber_hash:
          type: boolean
        slug:
          type: string
    AdminEnvironmentDetail:
      type: object
      required:
      - id
      - slug
      - name
      - require_subscriber_hash
      - has_previous_secret
      - created_at
      properties:
        created_at:
          type: string
        has_previous_secret:
          type: boolean
          description: |-
            True while a rotation overlap is open (the previous secret still
            verifies live `<Inbox />` sessions).
        id:
          type: string
        name:
          type: string
        require_subscriber_hash:
          type: boolean
        slug:
          type: string
        subscriber_hmac_rotated_at:
          type: string
          nullable: true
        subscriber_hmac_secret:
          type: string
          description: |-
            The dedicated subscriber HMAC secret. Plaintext by design. The customer
            backend computes hashes with it. Returned only to roles holding
            `env:read_secret` (developer/admin). Omitted otherwise.
          nullable: true
    AdminHmacRotation:
      type: object
      required:
      - subscriber_hmac_secret
      - has_previous_secret
      properties:
        has_previous_secret:
          type: boolean
        subscriber_hmac_rotated_at:
          type: string
          nullable: true
        subscriber_hmac_secret:
          type: string
          description: |-
            The new current secret. Update the customer backend with it. The
            previous secret keeps verifying until the rotation is completed.
    AdminInboxItem:
      type: object
      required:
      - id
      - source
      - category
      - payload
      - occurred_at
      - read
      properties:
        category:
          type: string
        id:
          type: string
        occurred_at:
          type: string
        payload: {}
        read:
          type: boolean
        source:
          type: string
    AdminLoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
        password:
          type: string
    AdminMe:
      type: object
      required:
      - id
      - email
      - name
      - role
      - capabilities
      properties:
        capabilities:
          type: array
          items:
            type: string
          description: |-
            Capability strings the SPA gates UI on (server-side enforcement is the
            real boundary).
        email:
          type: string
        id:
          type: string
          description: TypeID, `adm_…`.
        name:
          type: string
        role:
          type: string
          description: '''viewer'' | ''operator'' | ''developer'' | ''admin''.'
    AdminNotification:
      type: object
      required:
      - id
      - subscriber_id
      - category
      - payload
      - created_at
      - visible_at
      properties:
        category:
          type: string
        created_at:
          type: string
        deliver_at:
          type: string
          nullable: true
        id:
          type: string
          description: TypeID, `notif_…`.
        payload: {}
        read_at:
          type: string
          nullable: true
        subscriber_id:
          type: string
        visible_at:
          type: string
    AdminNotificationPage:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminNotification'
        next_cursor:
          type: string
          nullable: true
    AdminNotificationTimeline:
      type: object
      required:
      - id
      - subscriber_id
      - timeline
      properties:
        id:
          type: string
        subscriber_id:
          type: string
        timeline:
          type: array
          items:
            $ref: '#/components/schemas/AdminTimelineEntry'
    AdminPreference:
      type: object
      required:
      - category
      - channel
      - enabled
      properties:
        category:
          type: string
        channel:
          type: string
        enabled:
          type: boolean
    AdminReplayResult:
      type: object
      required:
      - replayed
      properties:
        replayed:
          type: integer
          format: int64
          description: Number of parked jobs moved back into the claim path.
    AdminSetPasswordRequest:
      type: object
      required:
      - password
      properties:
        password:
          type: string
    AdminSubscriberView:
      type: object
      required:
      - subscriber_id
      - created_at
      - counters
      - read_watermark
      - seen_watermark
      - preferences
      - inbox
      properties:
        counters:
          $ref: '#/components/schemas/AdminCounts'
        created_at:
          type: string
          description: Governs broadcast visibility (`broadcast.created_at >= this`).
        inbox:
          type: array
          items:
            $ref: '#/components/schemas/AdminInboxItem'
          description: |-
            The subscriber's recent merged inbox, from the SAME canonical query
            the subscriber plane serves.
        preferences:
          type: array
          items:
            $ref: '#/components/schemas/AdminPreference'
        read_watermark:
          type: string
        seen_watermark:
          type: string
        subscriber_id:
          type: string
    AdminTimelineEntry:
      type: object
      required:
      - status
      - occurred_at
      properties:
        occurred_at:
          type: string
        status:
          type: string
    AdminUpdateUserRequest:
      type: object
      properties:
        disabled:
          type: boolean
          nullable: true
        name:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
    AdminUserView:
      type: object
      required:
      - id
      - email
      - name
      - role
      - disabled
      - created_at
      - updated_at
      properties:
        created_at:
          type: string
        disabled:
          type: boolean
        email:
          type: string
        id:
          type: string
          description: TypeID, `adm_…`.
        name:
          type: string
        role:
          type: string
        updated_at:
          type: string
    Broadcast:
      type: object
      required:
      - id
      - category
      - payload
      - created_at
      - idempotency_key
      properties:
        category:
          type: string
        created_at:
          type: string
          format: date-time
        id:
          $ref: '#/components/schemas/BroadcastId'
        idempotency_key:
          type: string
        payload:
          $ref: '#/components/schemas/Payload'
    BroadcastId:
      type: string
      description: 'TypeID: `bcast_` + UUIDv7 suffix (Crockford base32).'
      pattern: ^bcast_[0-7][0-9a-hjkmnp-tv-z]{25}$
      example: bcast_01h455vb4pex5vsknk084sn02q
    CreateBroadcastRequest:
      type: object
      required:
      - category
      properties:
        category:
          type: string
          maxLength: 255
          example: product.update
        idempotency_key:
          type: string
          maxLength: 255
        payload:
          $ref: '#/components/schemas/Payload'
    CreateNotificationsRequest:
      type: object
      description: Exactly one of `subscriber_id` / `subscriber_ids` is required.
      required:
      - category
      properties:
        category:
          type: string
          maxLength: 255
          example: payment.failed
        deliver_at:
          type: string
          format: date-time
          description: Scheduled delivery; must be in the future, at most 13 months out.
        idempotency_key:
          type: string
          description: Client-supplied; server-generated and echoed if omitted. Covers the whole batch.
          maxLength: 255
        payload:
          $ref: '#/components/schemas/Payload'
        subscriber_id:
          type: string
          description: 'Single-recipient sugar for `subscriber_ids: [x]`.'
          maxLength: 255
        subscriber_ids:
          type: array
          items:
            type: string
            maxLength: 255
          description: Recipients; one notification row each. >100 → use a broadcast.
          maxItems: 100
          minItems: 1
    CreateNotificationsResponse:
      type: object
      required:
      - idempotency_key
      - notifications
      properties:
        idempotency_key:
          type: string
        notifications:
          type: array
          items:
            type: object
            required:
            - id
            - subscriber_id
            properties:
              id:
                $ref: '#/components/schemas/NotificationId'
              subscriber_id:
                type: string
    Error:
      type: object
      description: Error envelope. Every non-2xx response has this shape.
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              description: Stable, machine-readable code. Branch on this, not on the HTTP status or `message`. The error table in the API description lists every code.
              enum:
              - invalid_request
              - unauthorized
              - forbidden
              - not_found
              - conflict
              - rate_limited
              - too_many_connections
              - internal
              example: invalid_request
            message:
              type: string
              description: Human-readable detail, for logs and developers. Not stable, do not parse.
    InboxCounts:
      type: object
      required:
      - unread
      - unseen
      properties:
        unread:
          type: integer
          minimum: 0
        unseen:
          type: integer
          minimum: 0
    InboxItem:
      type: object
      required:
      - id
      - source
      - category
      - payload
      - occurred_at
      - read
      - archived
      properties:
        archived:
          type: boolean
          description: Computed — per-item override OR at-or-below the archive watermark.
        category:
          type: string
        id:
          oneOf:
          - $ref: '#/components/schemas/NotificationId'
          - $ref: '#/components/schemas/BroadcastId'
          description: The TypeID prefix already encodes the source; `source` is kept as the explicit discriminator.
        occurred_at:
          type: string
          format: date-time
          description: The ordering timestamp — `visible_at` for direct, `created_at` for broadcast.
        payload:
          $ref: '#/components/schemas/Payload'
        read:
          type: boolean
          description: Computed — per-item exception OR at-or-below the read watermark.
        source:
          type: string
          description: Routes mark-read to the right endpoint; the SDK handles this.
          enum:
          - notification
          - broadcast
    InboxPage:
      type: object
      required:
      - items
      - next_cursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/InboxItem'
        next_cursor:
          type: string
          description: Opaque keyset token; null when the last page is reached.
          nullable: true
    NotificationId:
      type: string
      description: 'TypeID: `notif_` + UUIDv7 suffix (Crockford base32).'
      pattern: ^notif_[0-7][0-9a-hjkmnp-tv-z]{25}$
      example: notif_01h455vb4pex5vsknk084sn02q
    NotificationTimeline:
      type: object
      required:
      - id
      - subscriber_id
      - timeline
      properties:
        id:
          $ref: '#/components/schemas/NotificationId'
        subscriber_id:
          type: string
        timeline:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEntry'
          description: Append-only; ordered by `occurred_at`.
    Payload:
      type: object
      description: |
        Customer-defined JSON, delivered to the widget verbatim — the server
        never reads it (no templates, no interpretation). Max 16 KiB serialized.

        The optional **well-known fields** below are what the default
        `<Inbox />` rendering understands; a payload with none of them renders
        as category + timestamp only. All other fields ride along untouched
        for custom renderers (`renderItem`). Keys are snake_case: payloads are
        wire format and are never case-transformed by the SDK.
      properties:
        action_url:
          type: string
          format: uri
          description: Followed on item click by the default renderer (after mark-read).
        body:
          type: string
          description: Secondary line; treated as plain text, never HTML.
        icon_url:
          type: string
          format: uri
          description: Leading icon/avatar in the default rendering.
        title:
          type: string
          description: First line of the default item rendering.
      additionalProperties: true
    Preference:
      type: object
      required:
      - category
      - channel
      - enabled
      properties:
        category:
          type: string
        channel:
          type: string
          description: Only `in_app` in v1; push channels later, no contract break.
          enum:
          - in_app
        enabled:
          type: boolean
    PreferenceList:
      type: object
      required:
      - preferences
      properties:
        preferences:
          type: array
          items:
            $ref: '#/components/schemas/Preference'
    PreferenceWriteList:
      type: object
      description: Partial upsert — listed (category, channel) pairs are written; unlisted pairs are untouched. Setting enabled=true deletes the explicit row (absence means enabled).
      required:
      - preferences
      properties:
        preferences:
          type: array
          items:
            $ref: '#/components/schemas/Preference'
          maxItems: 100
          minItems: 1
    Subscriber:
      type: object
      required:
      - subscriber_id
      - created_at
      properties:
        created_at:
          type: string
          format: date-time
          description: Governs broadcast visibility for this subscriber.
        subscriber_id:
          type: string
    TimelineEntry:
      type: object
      required:
      - status
      - occurred_at
      properties:
        occurred_at:
          type: string
          format: date-time
        status:
          type: string
          description: Statuses appear as they happen; unknown future statuses must be ignored by clients.
          enum:
          - created
          - delivered_hint
          - seen
          - read
  responses:
    BadRequest:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found in this environment.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Per-API-key (management) or per-subscriber (widget) rate limit.
      headers:
        retry-after:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: rate_limited
              message: rate limit exceeded
    TooManyConnections:
      description: Per-subscriber live-stream connection cap reached.
      headers:
        retry-after:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: too_many_connections
              message: too many concurrent streams for this subscriber
    Unauthorized:
      description: Missing/invalid API key or subscriber hash.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  securitySchemes:
    AdminSession:
      type: apiKey
      in: cookie
      name: chimely_admin
      description: Server-side admin session cookie, set by POST /admin/api/login.
    ApiKeyBearer:
      type: http
      scheme: bearer
      description: Environment-scoped management API key.
    SubscriberEnv:
      type: apiKey
      in: header
      name: X-Chimely-Environment
    SubscriberEnvQ:
      type: apiKey
      in: query
      name: environment
    SubscriberHash:
      type: apiKey
      in: header
      name: X-Chimely-Subscriber-Hash
      description: Optional when the environment has require_subscriber_hash = false.
    SubscriberHashQ:
      type: apiKey
      in: query
      name: subscriber_hash
    SubscriberId:
      type: apiKey
      in: header
      name: X-Chimely-Subscriber
    SubscriberIdQ:
      type: apiKey
      in: query
      name: subscriber_id
  parameters:
    SubscriberIdPath:
      name: subscriber_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 255
      description: Customer-provided subscriber id (e.g. `usr_42`).
    NotificationIdPath:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/NotificationId'
    BroadcastIdPath:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/BroadcastId'
security: []
tags:
- name: management
  description: Backend-to-Chimely. Bearer API key.
- name: subscriber
  description: Widget-to-Chimely. HMAC subscriber hash.
- name: admin
  description: Instance admin dashboard. Built-in users, session cookie.
